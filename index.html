  <script>
    // Global tracking references for Cloudflare Turnstile initialization
    let turnstileWidgetId = null;
    
    window.onloadTurnstileCallback = function() {
        if (typeof turnstile !== "undefined") {
            turnstileWidgetId = turnstile.render('#my-turnstile-widget', {
                sitekey: '0x4AAAARADWJPqtDres3ON2q', // Explicit public verification sitekey
                callback: 'onTurnstileSuccess',
                size: 'invisible'
            });
        }
    };

    async function loadTopLevelAI() {
      try {
        const response = await fetch('Assets/AI.html');
        if (!response.ok) throw new Error('Failed to load AI file');
        const text = await response.text();
        
        const parser = new DOMParser();
        const doc = parser.parseFromString(text, 'text/html');
        
        // 1. Extract style tags and hook safely to head layout
        const inlineStyle = doc.querySelector('style');
        if (inlineStyle) {
          document.head.appendChild(inlineStyle.cloneNode(true));
          inlineStyle.remove();
        }
        
        // 2. Extract script code block strings safely
        const embeddedScript = doc.querySelector('script');
        let scriptCode = "";
        if (embeddedScript) {
          scriptCode = embeddedScript.textContent;
          embeddedScript.remove();
        }
        
        // 3. Inject remaining clean template layouts into view layer
        document.getElementById('ai-chatbot-container').innerHTML = doc.body.innerHTML;

        // 4. Force compilation of functional expressions on true window scope
        if (scriptCode.trim() !== "") {
          const globalScript = document.createElement('script');
          globalScript.textContent = scriptCode;
          document.body.appendChild(globalScript);
        }

        // 5. Append implicit script script tag with runtime callback handlers
        const turnstileScript = document.createElement('script');
        turnstileScript.src = "https://challenges.cloudflare.com/turnstile/v0/api.js?onload=onloadTurnstileCallback";
        turnstileScript.async = true;
        turnstileScript.defer = true;
        document.head.appendChild(turnstileScript);

      } catch (err) {
        console.error('AI Loader Error:', err);
      }
    }

    document.addEventListener("DOMContentLoaded", loadTopLevelAI);
  </script>

  <script>
    // Check if the URL has a hash routing rule (like #leaderboard or #rules)
    const currentHash = window.location.hash;
    const targetBaseUrl = "https://astralyxpvp.pages.dev";

    if (currentHash) {
      const cleanPath = currentHash.replace('#', '/');
      const currentSearch = window.location.search;
      document.getElementById('main-frame').src = targetBaseUrl + cleanPath + currentSearch;
    }
  </script>
  
  <div id="ai-chatbot-container"></div>
