<script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>

<div id="ai-chat-window" class="ai-hidden">
    <div class="ai-chat-header">
        <h3>AstraBot AI</h3>
        <button onclick="toggleAIChat()">&times;</button>
    </div>
    <div id="ai-chat-messages" class="ai-chat-messages">
        <div class="ai-message ai-assistant">Hello! Welcome to AstralyxPvP. How can I help you today?</div>
    </div>
    
    <div id="my-turnstile-widget" class="cf-turnstile" data-sitekey="0x4AAAAAADWJPqtDres3ON2q" data-callback="onTurnstileSuccess" data-size="invisible"></div>

    <div class="ai-chat-input-container">
        <input type="text" id="ai-user-input" placeholder="Ask about AstralyxPvP..." onkeypress="handleAIKeyPress(event)">
        <button id="ai-send-btn" onclick="sendAIMessage()">Send</button>
    </div>
</div>

<script>
    const WORKER_URL = 'https://astralyxpvp.chessmrbeaston.workers.dev/api'; 
    let conversationHistory = [{ role: 'assistant', content: 'Hello! Welcome to AstralyxPvP.' }];
    let turnstileToken = "";

    // This runs automatically when Turnstile validates the user
    function onTurnstileSuccess(token) {
        turnstileToken = token;
    }

async function sendAIMessage() {
        const inputEl = document.getElementById('ai-user-input');
        const messageText = inputEl.value.trim();
        if (!messageText) return;

        if (!turnstileToken) {
            alert("Security check pending. Please wait a moment.");
            return;
        }

        inputEl.value = '';
        appendMessage(messageText, 'ai-user');
        conversationHistory.push({ role: 'user', content: messageText });

        const loadingId = appendMessage('Thinking...', 'ai-assistant');

        // 1. Fetch your massive instructions file directly from the frontend browser context
        let systemPromptText = "You are a helpful assistant.";
        try {
            const fileCheck = await fetch('/Assets/instructions.txt');
            if (fileCheck.ok) {
                systemPromptText = await fileCheck.text();
            }
        } catch (fileErr) {
            console.error("Could not fetch instruction file locally, using default fallback.");
        }

        // 2. Dispatch everything securely to your Cloudflare Worker
        try {
            const response = await fetch(WORKER_URL, {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json',
                    'cf-turnstile-response': turnstileToken 
                },
                body: JSON.stringify({ 
                    messages: conversationHistory,
                    // Sending the text file content directly inside the JSON payload
                    config_prompt: systemPromptText 
                })
            });

            turnstileToken = "";
            if (typeof turnstile !== "undefined") turnstile.reset('#my-turnstile-widget');

            const data = await response.json();
            document.getElementById(loadingId).remove();

            if (response.ok && data.reply) {
                appendMessage(data.reply, 'ai-assistant');
                conversationHistory.push({ role: 'assistant', content: data.reply });
            } else {
                appendMessage(data.error || 'Security verification failed.', 'ai-assistant');
            }
        } catch (error) {
            document.getElementById(loadingId).remove();
            appendMessage('Could not connect to secure verification server.', 'ai-assistant');
        }
    }

    // ... keeping your existing layout functions (appendMessage, toggleAIChat, etc.)
</script>
